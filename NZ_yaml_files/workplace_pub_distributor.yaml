venue_type: "pub"
activity_map_key: "primary_activity"
subset_key: "worker"

settings:
  verbose: true
  use_spatial_index: true

venue_selection:
  person_location_source: "geographical_unit.coordinates"
  venue_geo_level: "SGU"
  batch_geo_level: "SGU"
  consider_by: "count"
  count: 50

eligibility:
  global_filters:
    - attribute: "Occode"
      type: "categorical"
      values: [20]

allocation:
  track_capacity: false
  strategy: "closest_balanced"
  enforce_no_empty_venues: true


fallback:
  strategy: "skip"

exports:
  venue_summary: "output/1911/workplace_pub_venue_summary.csv"
  unallocated_report: "output/1911/workplace_pub_unallocated.csv"
