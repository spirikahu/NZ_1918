# --- IDENTITY ---
# These link the distributor to venue objects and person activity maps.
#   venue_type:       Which venue type from the world to distribute to.
#   activity_map_key: The top-level key added to person.activity_map (e.g., "primary_activity").
#   subset_key:       The subset name within the venue (e.g., venue.subsets["student"]).
#   activity_type:    The nested key under activity_map_key (e.g., person.activity_map["primary_activity"]["education"]).
venue_type: "workplace"
activity_map_key: "primary_activity"
subset_key: "worker"

# --- SETTINGS ---
#   verbose:           If true, logs detailed per-SGU allocation stats.
#   use_spatial_index: If true, builds a cKDTree for fast nearest-venue lookups.
#                      Required when consider_by is "count" or "distance".
settings:
  verbose: true
  use_spatial_index: true

# --- VENUE SELECTION ---
# Controls HOW candidate venues are found for each person/batch.
#
#   person_location_source: Dot-path to get (lat, lon) from a Person object.
#       Examples: "geographical_unit.coordinates", "properties.workplace_sgu"
#
#   venue_geo_level: The geography level at which venues are grouped (e.g., "SGU").
#   batch_geo_level: The geography level at which people are batched for allocation.
#       Usually same as venue_geo_level. People in the same batch share a centroid.
#
#   consider_by: How to build the candidate venue pool. Options:
#       "count"    → Find the N closest venues via spatial index (N = count below).
#       "distance" → Find ALL venues within max_distance km.
#       "geo_unit" → Only consider venues in the same geographical unit (no spatial search).
#
#   count: Number of nearest venues to consider (only used when consider_by = "count").
#       Higher = broader search, more likely to find capacity, but slower.
#       50 means each batch considers the 50 closest schools.
venue_selection:
  person_location_source: "geographical_unit.coordinates"
  venue_geo_level: "SGU"
  batch_geo_level: "SGU"
  consider_by: "count"
  count: 50

# --- ELIGIBILITY ---
# Filters applied to ALL people BEFORE allocation. Only matching people are eligible.
#
#   global_filters: List of attribute filters. All must pass (AND logic).
#     Each filter has:
#       attribute: Name of the person attribute (checked in order: person.age/sex → person.properties → nested path)
#       type:      "numerical" (min/max range) or "categorical" (value/values match)
#       min/max:   Inclusive bounds for numerical filters.
#       value:     Single match for categorical. values: list of matches.

eligibility:
  global_filters:
    - attribute: "Occode"
      type: "categorical"
      values: [2, 3, 5, 12, 50]
      # Excluded: Occode 1 (Professional) — 0 people in data
      # Excluded: Occode 4 (Agricultural) — 0 venues with BTCode 4

  # --- ATTRIBUTE MATCHING ---
  # Match person's Occode to venue's BTCode so workers go to the right type of workplace.
  # Keys = venue BTCode → Values = list of person Occode values that are allowed there.
  attributes:
    - name: "Occode"
      type: "categorical"
      venue_column: "BTCode"
      case_sensitive: false
      matching_rules:
        "2": ["2"]        # BTCode 2 venues ← Sales workers
        "3": ["3"]        # BTCode 3 venues ← Service workers
        "5": ["5"]        # BTCode 5 venues ← Production workers
        "12": ["12"]      # BTCode 12 venues ← Education (Other)
        "50": ["50"]      # BTCode 50 venues ← Miners


# --- ALLOCATION ---
# Controls HOW people are assigned to venues from their candidate pool.
#
#   track_capacity: If true, tracks how many people are assigned to each venue.
#   when_full:      What happens when a venue reaches capacity:
#       "exclude" → Skip the venue (default). "overflow" → Allow over-capacity.
#   fixed_capacity: Maximum people per venue (all venues get the same limit).
#
#   strategy: The allocation algorithm. Options:
#       "random"           → Shuffles venues randomly, fills sequentially.
#       "closest"          → Sorts venues by distance, fills nearest first (sequential pointer).
#                            ⚠ Can leave far venues empty if near ones absorb all demand.
#       "closest_balanced" → Weights selection by BOTH distance (1/d) and remaining capacity.
#                            Uses probabilistic selection (np.random.choice) to spread people
#                            across all nearby venues proportionally. Best for avoiding empty venues.
#       "proportional"     → Like closest_balanced but without capacity weighting (distance only).
#       "largest_capacity" → Picks the venue with the most total capacity.
allocation:
  track_capacity: false              # Disabled — venues accept unlimited workers
  strategy: "closest_balanced"

# --- FALLBACK ---
# Progressively expand search radius to find matching BTCode venues for workers
# in areas without nearby mines/factories. Multiplies count by 3 each iteration.
# Iteration search counts: 150 → 450 → 1350 → 4050 → 12150
fallback:
  strategy: "relax_distance"
  relax_params:
    distance_multiplier: 3.0
    max_iterations: 5

# --- EXPORTS ---
# CSV reports generated after allocation completes.
#   venue_summary:      Per-workplace stats (workers count, avg/min/max age, capacity, remaining).
#   unallocated_report: Details of eligible people who were NOT allocated (geo unit, age, Occode).
exports:
  venue_summary: "output/1911/workplace_venue_summary.csv"
  unallocated_report: "output/1911/workplace_unallocated.csv"