# Allocation Strategy for 1918 New Zealand Households
# One step per sN_cM column — faithfully reproduces census household counts.
# sN_cM: N total occupants, M children (0-17), N-M adults (18+)
# Ordered largest → smallest so complex households are filled first.
# s11p_cM treated as 11-person minimum; promotion handles any overflow.

enabled: true

steps:

  # =============================================
  # s11p: 11+ person households
  # =============================================
  - name: "s11p_c10"
    type: "household"
    patterns:
      - pattern: "s11p_c10"
        assumption: "10 1"
    enable_demotion: false
    refresh_pools: false

  - name: "s11p_c9"
    type: "household"
    patterns:
      - pattern: "s11p_c9"
        assumption: "9 2"
