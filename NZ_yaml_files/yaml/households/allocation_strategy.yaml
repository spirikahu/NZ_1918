  - name: "Excess Children"
    type: "household_excess"
    refresh_pools: false
    target_patterns:
      - "s11p_c1"
      - "s11p_c2"
      - "s11p_c3"
      - "s10_c1"
      - "s10_c2"
      - "s10_c3"
